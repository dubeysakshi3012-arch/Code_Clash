services:
  postgres:
    image: postgres:15-alpine
    container_name: codeclash_postgres
    networks:
      - codeclash_net
    environment:
      POSTGRES_USER: codeclash
      POSTGRES_PASSWORD: codeclash_password
      POSTGRES_DB: codeclash
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeclash"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    container_name: codeclash_redis
    networks:
      - codeclash_net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codeclash_backend
    networks:
      - codeclash_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      # host.docker.internal = host machine (works on Docker Desktop Windows/Mac; avoids DNS "postgres" resolution issues)
      DATABASE_URL: postgresql://codeclash:codeclash_password@host.docker.internal:5433/codeclash
      REDIS_URL: redis://host.docker.internal:6379/0
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  socket-server:
    build:
      context: ./socket-server
      dockerfile: Dockerfile
    container_name: codeclash_socket
    networks:
      - codeclash_net
    env_file:
      - .env
    environment:
      API_URL: http://backend:8000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SOCKET_SERVER_SECRET: ${SOCKET_SERVER_SECRET}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      - backend
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
    networks:
      - codeclash_net
    container_name: codeclash_frontend
    depends_on:
      - backend
      - socket-server
    ports:
      - "3000:3000"

networks:
  codeclash_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
