# Development overrides: hot reload, mounted source
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock

  socket-server:
    build:
      context: ./socket-server
      dockerfile: Dockerfile
    volumes:
      - ./socket-server:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
